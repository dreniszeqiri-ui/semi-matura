<!DOCTYPE html>
<html lang="sq">
<head>
<meta charset="UTF-8">
<title>Ftesë Semi-Maturë 😄</title>

<style>
  body {
    font-family: Arial;
    text-align: center;
    margin-top: 100px;
    background: #f5f5f5;
  }

  .box {
    border: 2px solid black;
    padding: 30px;
    display: inline-block;
    background: white;
    border-radius: 10px;
  }

  button {
    position: relative;
    margin: 10px;
    padding: 12px 25px;
    font-size: 18px;
    cursor: pointer;
    transition: all 0.3s ease;
  }

  #po {
    background: lightgreen;
  }

  #jo, #ndoshta {
    background: lightcoral;
    position: absolute;
  }

</style>
</head>

<body>

<div class="box">
  <h2>A do të vish në semi-maturë me mua? 😊</h2>

  <button id="po">Po 💚</button>
  <button id="jo">Jo 😅</button>
  <button id="ndoshta">Ndoshta 🤔</button>
</div>

<script>
  const po = document.getElementById("po");
  const jo = document.getElementById("jo");
  const ndoshta = document.getElementById("ndoshta");

  // funksion që i lëviz butonat rastësisht
  function moveButton(btn) {
    const x = Math.random() * window.innerWidth * 0.7;
    const y = Math.random() * window.innerHeight * 0.7;

    btn.style.left = x + "px";
    btn.style.top = y + "px";
  }

  // kur afrohet miu -> ikin 😄
  jo.addEventListener("mouseover", () => {
    moveButton(jo);
    po.style.transform = "scale(1.2)";
  });

  ndoshta.addEventListener("mouseover", () => {
    moveButton(ndoshta);
    po.style.transform = "scale(1.2)";
  });

  // kur klikohet PO
  po.addEventListener("click", () => {
    document.body.innerHTML = "<h1>Yesss 😍 Do të jetë nata më e mirë!</h1>";
  });

</script>

</body>
</html>
